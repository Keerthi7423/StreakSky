name: iOS CD Pipeline

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build_and_deploy_ios:
    name: Build and Release iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS IPA
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          # Requires setting up ExportOptions.plist in ios/Runner to use the App Store Connect API keys
          # In a real setup, we would decode the provisioning profiles or let Xcode handle it with the API keys.
          flutter build ipa --release --export-method app-store

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-release-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 7

