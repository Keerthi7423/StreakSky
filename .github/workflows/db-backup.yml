name: Database Backup to Azure

on:
  schedule:
    - cron: '0 2 * * *' # Run at 2 AM UTC daily
  workflow_dispatch: # Allow manual trigger

jobs:
  backup_database:
    name: Backup Supabase to Azure Blob Storage
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL Client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Dump Database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          # Create a backup file with timestamp
          TIMESTAMP=$(date +'%Y-%m-%d_%H-%M-%S')
          BACKUP_FILE="backup_${TIMESTAMP}.sql"
          
          # Run pg_dump to extract schema and data
          pg_dump "$SUPABASE_DB_URL" > "$BACKUP_FILE"
          
          # Compress the backup file to save storage space
          gzip "$BACKUP_FILE"
          
          # Export for next step
          echo "BACKUP_FILE=${BACKUP_FILE}.gz" >> $GITHUB_ENV

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Upload Backup to Azure Blob Storage
        uses: azure/CLI@v1
        with:
          azcliversion: 2.30.0
          inlineScript: |
            az storage blob upload \
              --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
              --container-name ${{ secrets.AZURE_STORAGE_CONTAINER }} \
              --name $BACKUP_FILE \
              --file $BACKUP_FILE \
              --auth-mode login

      - name: Clean up old backups (Optional - Keep last 30 days)
        # This step assumes a lifecycle management policy isn't already active in Azure
        # It's better to configure Blob Storage Lifecycle Management in Azure directly
        run: |
          echo "Backup $BACKUP_FILE uploaded successfully."
